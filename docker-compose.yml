version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: bitespeed_pg
    environment:
      POSTGRES_USER: bitespeed
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bitespeed_identity
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
